services:

  redis:
    image: redis
    command: redis-server
    expose:
      - 6379

  db:
    image: postgres:18
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=reopt
      - POSTGRES_DB=reopt
    expose:
      - 5432

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    image: base-api-image:latest
    command:  >
      "celery -A reopt_api worker -l info"
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - DB_NAME=reopt
      - DB_USERNAME=postgres
      - DB_PASSWORD=reopt
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - NLR_API_KEY
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/opt/reopt
    depends_on:
      - db
      - redis
      - julia

  django:
    image: base-api-image:latest
    command:  >
      "python manage.py migrate
      && /opt/reopt/bin/wait-for-it.bash -t 0 julia:8081 -- python manage.py runserver 0.0.0.0:8000"
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - DB_NAME=reopt
      - DB_USERNAME=postgres
      - DB_PASSWORD=reopt
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - NLR_API_KEY
    env_file:
      - path: .env
        required: false
    depends_on:
      - db
      - redis
      - julia
      - celery
    ports:
      - 8000:8000
    volumes:
      - .:/opt/reopt

  julia:
    container_name: julia_api
    build:
      context: julia_src/
      dockerfile: Dockerfile
    environment:
      - XPRESS_JL_SKIP_LIB_CHECK=True
      - XPRESS_INSTALLED=False
    # command: julia --project=/opt/julia_src http.jl
    command: julia --project=. -e 'using Pkg; Pkg.instantiate(); include("http.jl")'
    ports:
      - "8081:8081"
    volumes:
      - ./julia_src:/opt/julia_src

  db-syncer:
    profiles:
      - db-syncer
    build:
      context: .
      dockerfile: db-syncer/Dockerfile
      args:
        BUNDLE_FROZEN: "false"
    volumes:
      - .:/app
      - ~/.vault-token:/root/.vault-token:ro
    depends_on:
      - db
    environment:
      - LOAD_VAULT_ENV_SECRETS=true
      - DEV_DB_HOST=db
      - DEV_DB_NAME=reopt_api
      - DEV_DB_USERNAME=postgres
      - DEV_DB_PASSWORD=reopt

volumes:
  postgres_data:
