name: Undeploy Closed PRs

on:
  schedule:
    - cron: "23 16 * * *" # Every day at 09:23 AM MST / 10:23 AM MDT
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vault-nonsensitive-secrets:
    name: Vault Non-sensitive Secrets
    uses: TADA/vault-action/.github/workflows/nonsensitive-secrets.yml@nonsensitive
    with:
      nonsensitive-secrets: |
        secret/data/reopt-api/ci/deploy staging_rancher_project_id ;
    secrets:
      vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
      vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}

  deploy-metadata:
    name: Deploy Metadata
    runs-on: self-hosted
    needs:
      - vault-nonsensitive-secrets
    outputs:
      staging-metadata: ${{ toJSON(steps.staging-metadata.outputs) }}
    steps:
      - name: Staging Metadata
        id: staging-metadata
        uses: TADA/deploy-action/metadata@v2
        with:
          deploy-env: staging
          app-name: reopt-api
          rancher-project-id: ${{ fromJSON(needs.vault-nonsensitive-secrets.outputs.nonsensitive-secrets).staging_rancher_project_id }}
          branch-url-host-base: ${{ secrets.STAGING_URL_HOST_BASE }}
          branch-db-name-base: reopt_api_staging

  undeploy-staging:
    name: Undeploy Staging
    needs:
      - deploy-metadata
    uses: TADA/deploy-action/.github/workflows/undeploy-closed-prs.yml@v2
    with:
      base-metadata: ${{ needs.deploy-metadata.outputs.staging-metadata }}
      vault-kubeconfig-path: secret/data/deploy/staging/on-prem-rancher-test-ponderosa-cluster-test
      vault-db-superuser-path: secret/data/reopt-db/staging/db-superuser
    secrets:
      vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
      vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
